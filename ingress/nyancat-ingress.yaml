apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nyancat-redirect-slash
  namespace: default
spec:
  redirectRegex:
    regex: "^(https?://[^/]+)/nyancat$"
    replacement: "${1}/nyancat/"
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nyancat-strip-prefix
  namespace: default
spec:
  stripPrefix:
    prefixes:
      - /nyancat
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nyancat
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-nyancat-redirect-slash@kubernetescrd,default-nyancat-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /nyancat
            pathType: Prefix
            backend:
              service:
                name: nyancat
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: probe-test-app
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: probe-test-app
                port:
                  number: 8000