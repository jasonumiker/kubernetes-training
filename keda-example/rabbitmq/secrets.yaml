apiVersion: v1
kind: Secret
metadata:
  name: erlang-cookie
type: generic
stringData:
  cookie: super-secret-erlang-cookie
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-definitions
type: Opaque
stringData:
  definitions.json: |
    {
      "users": [
        {
          "name": "admin",
          "password": "admin",
          "tags": "administrator"
        }
      ],
      "vhosts": [
        {
          "name": "/"
        }
      ],
      "permissions": [
        {
          "user": "admin",
          "vhost": "/",
          "configure": ".*",
          "write": ".*",
          "read": ".*"
        }
      ]
    }