apiVersion: v1  
kind: Pod  
metadata:  
  name: nginx
  labels:
    app.kubernetes.io/name: nginx
spec:  
  containers:  
    - name: nginx
      image: mirror.gcr.io/nginx:1.29.8-trixie
      volumeMounts:  
        - mountPath: "/usr/share/nginx/html"
          name: test-pv
  volumes:  
    - name: test-pv
      persistentVolumeClaim:  
        claimName: test-pvc
